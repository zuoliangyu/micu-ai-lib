name: Aggregate MICU AI Lib

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      add_repo:
        description: '要新加入 registry 的 owner/repo（留空则只跑常规聚合）'
        required: false
        default: ''
  repository_dispatch:
    types: [member-updated]

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - run: pip install pyyaml jsonschema

      - name: Add new repo to registry
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.add_repo != '' }}
        run: python scripts/add_repo.py "${{ github.event.inputs.add_repo }}"

      - name: Commit registry update
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.add_repo != '' }}
        run: |
          git config user.name "micu-ai-lib-bot"
          git config user.email "micu-ai-lib-bot@users.noreply.github.com"
          git add registry.yaml
          if ! git diff --cached --quiet; then
            git commit -m "registry: add ${{ github.event.inputs.add_repo }}"
            git push
          fi

      - name: Aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/aggregate.py

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./docs
          production-deploy: true
          deploy-message: "Aggregate ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-github-deployment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
