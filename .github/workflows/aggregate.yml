name: Aggregate MICU AI Lib

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      add_repo:
        description: 'owner/repo to add (optional)'
        required: false
        default: ''
  repository_dispatch:
    types: [member-updated]

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml jsonschema

      - name: Add new repo to registry
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.add_repo != '' }}
        run: python scripts/add_repo.py "${{ github.event.inputs.add_repo }}"

      - name: Commit registry update
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.add_repo != '' }}
        run: |
          git config user.name "micu-ai-lib-bot"
          git config user.email "micu-ai-lib-bot@users.noreply.github.com"
          git add registry.yaml
          if ! git diff --cached --quiet; then
            git commit -m "registry: add ${{ github.event.inputs.add_repo }}"
            git push
          fi

      - name: Aggregate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/aggregate.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
