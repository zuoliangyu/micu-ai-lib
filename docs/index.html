<!doctype html>
<html lang="zh-CN" data-theme="micu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MICU AI 开放社区 · 工作室项目矩阵</title>
  <link rel="icon" type="image/png" href="./assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..900,0..100;1,9..144,300..900,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap">

</head>
<body>
  <div class="paper-grain" aria-hidden="true"></div>
  <div class="paper-noise" aria-hidden="true"></div>

  <aside class="brand-block">
    <a class="brand-logo" href="#/" aria-label="首页">
      <img src="./assets/logo.png" alt="MICU">
    </a>
    <div class="brand-title">MICU<em>AI 开放社区</em></div>
    <div class="brand-tagline">studio · projects · community</div>
    <div class="brand-actions">
      <button class="topbtn" id="theme-toggle" type="button" title="切换亮暗主题">
        <span class="topbtn-icon" id="theme-toggle-icon">◐</span>
        <span id="theme-toggle-label">DARK</span>
      </button>
      <a class="topbtn" href="https://github.com/zuoliangyu/micu-ai-lib" target="_blank" rel="noopener" title="GitHub 仓库">
        <span class="topbtn-icon">↗</span><span>GITHUB</span>
      </a>
    </div>
    <nav class="brand-views" aria-label="视图切换">
      <a class="viewbtn" data-view="cards" href="#/">卡片</a>
      <a class="viewbtn" data-view="list"  href="#/list">列表</a>
      <a class="viewbtn" data-view="table" href="#/table">表格</a>
    </nav>
  </aside>

  <div id="app">Loading…</div>

  <script src="./assets/app.js?v=20260521a"></script>
  <script>
    window.$docsify = {
      name: '',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'cards.md',
      relativePath: false,
      search: {
        placeholder: '搜索项目…',
        noData: '无匹配结果',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制',
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
</body>
</html>
