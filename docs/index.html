<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MICU AI 资源库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .card {
      display: block;
      padding: 16px;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      background: #fff;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.08); transform: translateY(-2px); }
    .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 4px; }
    .card h3 { margin: 8px 0 4px; font-size: 16px; }
    .card p { margin: 0 0 8px; font-size: 14px; color: #586069; }
    .card small { color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script>
    window.$docsify = {
      name: 'MICU AI 资源库',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: 'auto',
      homepage: 'cards.md'
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
